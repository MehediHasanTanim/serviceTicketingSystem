version: "3.9"

services:
  identity_service:
    build:
      context: ./backend/services/identity_service
    env_file:
      - ./backend/services/identity_service/.env.example
    volumes:
      - ./backend/services/identity_service:/app
    ports:
      - "8011:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./fronend
    ports:
      - "5176:80"
    depends_on:
      - identity_service

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
