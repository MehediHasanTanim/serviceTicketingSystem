[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
testpaths = tests
addopts = -ra --strict-markers --cov=. --cov-report=term-missing --cov-config=.coveragerc --cov-fail-under=60
markers =
    unit: fast unit tests
    integration: tests spanning multiple components
    regression: backend regression automation suite
    p0: critical business/security regression coverage
    p1: core module regression coverage
    p2: secondary regression behavior and edge coverage
    auth: authentication and token lifecycle coverage
    rbac: authorization and role/permission coverage
    service_orders: service order workflow coverage
    housekeeping: housekeeping workflow coverage
    integrations: integration workflow and contract coverage
    contracts: API response contract consistency coverage
